function initItems(){const i=[...D_A];D_Z.forEach(z=>i.push({s:z.s,d:z.d,b:z.b,p1:0,p2:0,p3:0,st:"zero"}));return i;}
function gc(ws,r,c){const a=XLSX.utils.encode_cell({r,c});const cl=ws[a];return cl?cl.v:null;}
function gn(ws,r,c){const v=gc(ws,r,c);return typeof v==="number"?v:0;}
function gs(ws,r,c){const v=gc(ws,r,c);return v!=null?String(v).trim():"";}
function parseXlsx(wb){let ad=null;const rk=wb.Sheets["Rekapitulace stavby"];if(rk){const pC=[];for(let c=50;c<90;c++){const v=gs(rk,91,c);if(v.includes("Prostavěnost"))pC.push({h:c,v:c+1,l:v});}if(pC.length>0){const om={"00":"VRN","03":"03-Int","04":"04-Ext"};const bo={};let tb=0;for(let ri=94;ri<=100;ri++){const code=gs(rk,ri,3);const lb=om[code];if(!lb)continue;const b=gn(rk,ri,32);tb+=b;const e={budget:Math.round(b)};pC.forEach((pc,pi)=>{e["p"+(pi+1)]=Math.round(gn(rk,ri,pc.v));});bo[lb]=e;}let cum=0;const t={budget:Math.round(tb),byObj:bo,periods:pC.map(p=>p.l)};pC.forEach((pc,pi)=>{const v=Math.round(gn(rk,103,pc.v));t["p"+(pi+1)]=v;cum+=v;});t.cum=cum;ad=t;}}const cfgs=[];wb.SheetNames.forEach(n=>{if(n.startsWith("00"))cfgs.push({name:n,label:"VRN",pCols:[24,28]});else if(n.startsWith("03"))cfgs.push({name:n,label:"03-Int",pCols:[23,27]});else if(n.startsWith("04"))cfgs.push({name:n,label:"04-Ext",pCols:[23,27]});});if(!cfgs.length)return null;cfgs.forEach(cfg=>{const ws=wb.Sheets[cfg.name];if(!ws||!ws["!ref"])return;const rng=XLSX.utils.decode_range(ws["!ref"]);for(let c=30;c<45;c++){if(gn(ws,rng.e.r,c)>100){cfg.pCols.push(c);break;}}});const items=[];cfgs.forEach(cfg=>{const ws=wb.Sheets[cfg.name];if(!ws||!ws["!ref"])return;const mx=XLSX.utils.decode_range(ws["!ref"]).e.r;let ck=null;for(let r=10;r<mx;r++){const typ=gs(ws,r,3),desc=gs(ws,r,5).slice(0,80),bv=gn(ws,r,9);const pv=cfg.pCols.map(c=>gn(ws,r,c));const p1=pv[0]||0,p2=pv[1]||0,p3=pv[2]||0;if(typ==="K"){if(ck&&(ck.p1||ck.p2||ck.p3||ck.b>0))items.push(ck);ck={s:cfg.label,d:desc,b:Math.round(bv*100)/100,p1:Math.round(p1*100)/100,p2:Math.round(p2*100)/100,p3:Math.round(p3*100)/100};}else if((typ==="M"||typ==="VV")&&ck){ck.b=Math.round((ck.b+bv)*100)/100;ck.p1=Math.round((ck.p1+p1)*100)/100;ck.p2=Math.round((ck.p2+p2)*100)/100;ck.p3=Math.round((ck.p3+p3)*100)/100;}else if(p1||p2||p3){if(ck&&(ck.p1||ck.p2||ck.p3||ck.b>0)){items.push(ck);ck=null;}let note="";[24,28,34,5,4].forEach(nc=>{if(!note){const nv=gs(ws,r,nc);if(nv&&!nv.startsWith("="))note=nv.slice(0,80);}});items.push({s:cfg.label,d:note||("Ř."+(r+1)),b:0,p1:Math.round(p1*100)/100,p2:Math.round(p2*100)/100,p3:Math.round(p3*100)/100});}}if(ck&&(ck.p1||ck.p2||ck.p3||ck.b>0))items.push(ck);});items.forEach(it=>{const cum=it.p1+it.p2+it.p3;if(it.b===0){it.st=cum>0?"manual":cum<0?"meneprace":"zero";}else{const p=(cum/it.b)*100;if(it.p2<0||it.p3<0)it.st="meneprace";else if(p>100)it.st="viceprace";else if(p>=99)it.st="done";else if(p>0)it.st="partial";else it.st="zero";}});return{items,auth:ad};}
const fmt=n=>n.toLocaleString("cs-CZ",{maximumFractionDigits:0});
const fmtK=n=>Math.abs(n)>=1e6?(n/1e6).toFixed(2).replace(".",",")+"\u00a0M":Math.abs(n)>=1e3?(n/1e3).toFixed(0)+"\u00a0tis.":fmt(n);
const ST={done:{l:"Hotovo",c:"#34d399",bg:"#34d39920"},partial:{l:"Rozprac.",c:"#fbbf24",bg:"#fbbf2420"},viceprace:{l:"Vícepráce",c:"#f87171",bg:"#f8717120"},meneprace:{l:"Méněpr.",c:"#a78bfa",bg:"#a78bfa20"},manual:{l:"Ruční",c:"#22d3ee",bg:"#22d3ee20"},zero:{l:"Nezaháj.",c:"#64748b",bg:"#64748b15"}};

function Badge({st}){const s=ST[st]||ST.zero;return <span style={{display:"inline-block",padding:"1px 7px",borderRadius:99,fontSize:9,fontWeight:700,background:s.bg,color:s.c}}>{s.l}</span>;}
function authFP(x){return x?[x.budget,x.p1,x.p2,x.p3||0,x.cum].join("|"):"";}
function itemKey(i){return i.s+"|"+Math.round(i.b)+"|"+Math.round(i.p1);}
function calcDiff(o,n){const ch=[],om={};o.forEach(i=>{const k=itemKey(i);if(!om[k])om[k]=[];om[k].push(i);});n.forEach(ni=>{const k=itemKey(ni);const nc=ni.p1+ni.p2+(ni.p3||0);if(om[k]&&om[k].length>0){const oi=om[k].shift();const oc=oi.p1+oi.p2+(oi.p3||0);if(Math.abs(oc-nc)>1)ch.push({type:"changed",item:ni,old:oi,diffCum:nc-oc});}else ch.push({type:"new",item:ni,diffCum:nc});});Object.values(om).forEach(arr=>arr.forEach(oi=>{const oc=oi.p1+oi.p2+(oi.p3||0);if(oc>0)ch.push({type:"removed",item:oi,diffCum:-oc});}));return ch.sort((a,b)=>Math.abs(b.diffCum)-Math.abs(a.diffCum));}
const LS={save(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch(e){}},load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},list(p){const k=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key.startsWith(p))k.push(key);}return k.sort().reverse();},del(k){try{localStorage.removeItem(k);}catch(e){}}};

            <div style={{background:C.card,borderRadius:8,border:"1px solid "+C.brd,padding:12}}><div style={{fontSize:11,fontWeight:600,marginBottom:8}}>Stavové rozložení</div><ResponsiveContainer width="100%" height={180}><PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={40} outerRadius={72} paddingAngle={2} dataKey="value">{pieData.map((d,i)=><Cell key={i} fill={d.fill}/>)}</Pie><Tooltip contentStyle={{background:"#1a2340",border:"1px solid #2a3a5e",borderRadius:6,fontSize:10,color:C.txt}}/><Legend wrapperStyle={{fontSize:9}}/></PieChart></ResponsiveContainer></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:8}}>{Object.entries(a.byObj).map(([k,v])=>{const cum=(v.p1||0)+(v.p2||0)+(v.p3||0);const op=v.budget>0?cum/v.budget*100:0;return(<div key={k} style={{background:C.card,borderRadius:8,border:"1px solid "+C.brd,padding:12,borderLeft:"3px solid "+(OC[k]||"#666")}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontWeight:700,fontSize:12}}>{k}</span><span style={{fontFamily:"monospace",fontWeight:700,fontSize:12,color:OC[k]}}>{op.toFixed(1)}%</span></div><div style={{background:C.brd,borderRadius:3,height:5,overflow:"hidden",marginBottom:5}}><div style={{width:Math.min(100,op)+"%",height:"100%",borderRadius:3,background:"linear-gradient(90deg,#3b82f6,#10b981)"}}/></div><div style={{fontSize:9,color:C.mut}}>Rozpočet: {fmtK(v.budget)} · Done: {fmtK(cum)} Kč</div><div style={{fontSize:8,color:C.mut,marginTop:2}}>P1: {fmtK(v.p1||0)} · P2: {fmtK(v.p2||0)} · P3: {fmtK(v.p3||0)}</div></div>);})}</div>
        </div>)}

        {tab==="table"&&(<div>
          <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}><input type="text" placeholder="🔍 Hledat..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:"1 1 160px",padding:"6px 10px",borderRadius:6,border:"1px solid "+C.brd,background:C.card,color:C.txt,fontSize:11,outline:"none"}}/><select value={fObj} onChange={e=>setFObj(e.target.value)} style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+C.brd,background:C.card,color:C.txt,fontSize:11}}><option value="all">Všechny obj.</option>{Object.keys(a.byObj).map(k=><option key={k} value={k}>{k}</option>)}</select><select value={fSt} onChange={e=>setFSt(e.target.value)} style={{padding:"6px 8px",borderRadius:6,border:"1px solid "+C.brd,background:C.card,color:C.txt,fontSize:11}}><option value="all">Všechny stavy</option>{Object.entries(ST).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>
          <div style={{background:C.card,borderRadius:6,padding:"5px 10px",marginBottom:6,fontSize:10,display:"flex",gap:12,color:C.mut,border:"1px solid "+C.brd}}><span>{fS.n} pol.</span><span>Rozpočet: <b style={{color:C.txt}}>{fmt(fS.b)} Kč</b></span><span>Prostavěno: <b style={{color:"#34d399"}}>{fmt(fS.cum)} Kč</b></span></div>
          <div style={{overflowX:"auto",background:C.card,borderRadius:8,border:"1px solid "+C.brd}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:"#0a0f1d"}}>{[["s","Obj.",42],["d","Popis",null],["b","Rozpočet",75],["cum","Celkem",75],["pct","%",38],["st","Stav",66]].map(([k,l,w])=>(<th key={k} onClick={()=>toggle(k)} style={{padding:"7px 5px",textAlign:k==="d"?"left":"right",width:w||undefined,cursor:"pointer",userSelect:"none",borderBottom:"1px solid "+C.brd,fontWeight:600,color:C.mut,fontSize:9}}>{l} {sortK===k?(sortD==="asc"?"▲":"▼"):"⇅"}</th>))}</tr></thead><tbody>{filtered.map((it,i)=>{const cum=it.p1+it.p2+(it.p3||0);const pv=it.b>0?((cum/it.b)*100).toFixed(1):"–";return(<tr key={i} style={{borderBottom:"1px solid "+C.brd}}><td style={{padding:"5px",textAlign:"center"}}><span style={{background:(OC[it.s]||"#666")+"20",color:OC[it.s],padding:"1px 4px",borderRadius:3,fontSize:8,fontWeight:700}}>{it.s}</span></td><td style={{padding:"5px",maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={it.d}>{it.d}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9}}>{it.b>0?fmt(it.b):"–"}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9,fontWeight:600,color:cum>0?"#34d399":cum<0?"#f87171":C.mut}}>{cum?fmt(cum):"–"}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9,fontWeight:700,color:pv!=="–"&&parseFloat(pv)>100?"#f87171":C.txt}}>{pv}{pv!=="–"?"%":""}</td><td style={{padding:"5px",textAlign:"center"}}><Badge st={it.st}/></td></tr>);})}</tbody></table></div>
        </div>)}

        {tab==="chat"&&(<div style={{background:C.card,borderRadius:8,border:"1px solid "+C.brd,display:"flex",flexDirection:"column",height:420}}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid "+C.brd,fontSize:11,fontWeight:600}}>💬 Dotazy k prostavěnosti <span style={{fontSize:9,color:C.mut,fontWeight:400,marginLeft:4}}>Claude Sonnet</span></div>
          <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:6}}>
            {msgs.length===0&&(<div style={{color:C.mut,fontSize:11,textAlign:"center",marginTop:20}}><div style={{fontSize:24,marginBottom:4}}>🔍</div><div style={{fontWeight:600,marginBottom:8}}>Zeptejte se na cokoliv</div><div style={{display:"flex",flexDirection:"column",gap:4}}>{["Které položky mají vícepráce?","Kolik stojí omítky celkem?","Co se prostavělo v P3?","Kolik zbývá v exteriéru?"].map((ex,i)=>(<button key={i} onClick={()=>setChatIn(ex)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid "+C.brd,background:"transparent",color:C.acc,cursor:"pointer",fontSize:10,textAlign:"left"}}>{ex}</button>))}</div></div>)}
            {msgs.map((m,i)=>(<div key={i} style={{alignSelf:m.r==="u"?"flex-end":"flex-start",maxWidth:"80%",padding:"7px 10px",borderRadius:8,background:m.r==="u"?C.acc+"20":"#ffffff06",border:"1px solid "+(m.r==="u"?C.acc+"40":C.brd),fontSize:11,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{m.t}</div>))}
            {chatLoad&&(<div style={{alignSelf:"flex-start",padding:"7px 10px",borderRadius:8,background:"#ffffff06",border:"1px solid "+C.brd,fontSize:11,opacity:.5}}>Analyzuji...</div>)}
            <div ref={chatEnd}/>
          </div>
          <div style={{padding:8,borderTop:"1px solid "+C.brd,display:"flex",gap:5}}>
            <input type="text" placeholder="Dotaz k rozpočtu..." value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} style={{flex:1,padding:"7px 10px",borderRadius:6,border:"1px solid "+C.brd,background:C.bg,color:C.txt,fontSize:11,outline:"none"}}/>
            <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()} style={{padding:"7px 14px",borderRadius:6,background:C.acc,color:"#fff",border:"none",cursor:"pointer",fontWeight:600,fontSize:11,opacity:chatLoad||!chatIn.trim()?.4:1}}>➤</button>
          </div>
        </div>)}

        {tab==="diff"&&(<div style={{background:C.card,borderRadius:8,border:"1px solid "+C.brd,padding:16}}><div style={{fontSize:13,fontWeight:700,marginBottom:12}}>🔄 Změny</div>{!diffData||diffData.length===0?(<div style={{color:C.mut,fontSize:12,textAlign:"center",padding:40}}>✅ Žádné změny.</div>):(<div><div style={{fontSize:11,color:C.mut,marginBottom:10}}>{diffData.filter(d=>d.type==="changed").length} změn · {diffData.filter(d=>d.type==="new").length} nových · {diffData.filter(d=>d.type==="removed").length} odebraných</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:"#0a0f1d"}}>{["Typ","Obj.","Popis","Před","Po","Rozdíl"].map((h,i)=>(<th key={i} style={{padding:"6px",textAlign:i>=3?"right":"left",borderBottom:"1px solid "+C.brd,color:C.mut,fontSize:9}}>{h}</th>))}</tr></thead><tbody>{diffData.map((d,i)=>{const isN=d.type==="new",isR=d.type==="removed";const oc=d.old?(d.old.p1+d.old.p2+(d.old.p3||0)):0;const nc=d.item.p1+d.item.p2+(d.item.p3||0);return(<tr key={i} style={{borderBottom:"1px solid "+C.brd,background:isN?"#065f4610":isR?"#7f1d1d10":"transparent"}}><td style={{padding:"5px"}}><span style={{fontSize:9,fontWeight:700,color:isN?"#34d399":isR?"#f87171":"#fbbf24"}}>{isN?"NOVÁ":isR?"ODEBR.":"ZMĚNA"}</span></td><td style={{padding:"5px"}}><span style={{background:(OC[d.item.s]||"#666")+"20",color:OC[d.item.s],padding:"1px 4px",borderRadius:3,fontSize:8,fontWeight:700}}>{d.item.s}</span></td><td style={{padding:"5px",maxWidth:250,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.item.d}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9}}>{isN?"–":fmt(oc)}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9}}>{isR?"–":fmt(nc)}</td><td style={{padding:"5px",textAlign:"right",fontFamily:"monospace",fontSize:9,fontWeight:700,color:d.diffCum>0?"#34d399":d.diffCum<0?"#f87171":C.mut}}>{d.diffCum>0?"+":""}{fmt(d.diffCum)} Kč</td></tr>);})}</tbody></table></div><div style={{marginTop:10,padding:"8px 12px",background:C.brd+"40",borderRadius:6,fontSize:11}}>Čistý dopad: <b style={{color:_.sumBy(diffData,"diffCum")>=0?"#34d399":"#f87171",fontFamily:"monospace"}}>{_.sumBy(diffData,"diffCum")>=0?"+":""}{fmt(_.sumBy(diffData,"diffCum"))} Kč</b></div></div>)}</div>)}

        {tab==="ver"&&(<div style={{background:C.card,borderRadius:8,border:"1px solid "+C.brd,padding:16}}><div style={{fontSize:13,fontWeight:700,marginBottom:12}}>📦 Verze</div>{versions.length===0?(<div style={{color:C.mut,fontSize:12,textAlign:"center",padding:40}}>Žádné verze.</div>):(<div style={{display:"flex",flexDirection:"column",gap:6}}>{versions.map((key,i)=>{const ts=parseInt(key.replace("ver:",""));const ds=isNaN(ts)?key:new Date(ts).toLocaleString("cs-CZ");return(<div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:i===0?C.acc+"10":"transparent",borderRadius:6,border:"1px solid "+C.brd}}><div><span style={{fontWeight:600,fontSize:12}}>{ds}</span>{i===0&&<span style={{marginLeft:8,fontSize:9,color:C.acc,fontWeight:700}}>POSLEDNÍ</span>}</div><div style={{display:"flex",gap:6}}><button onClick={()=>{const old=LS.load(key);if(old){const d=typeof old==="string"?JSON.parse(old):old;if(d.items){setDiffData(calcDiff(d.items.filter(x=>x.p1||x.p2||x.p3),items.filter(x=>x.p1||x.p2||x.p3)));setTab("diff");}}}} style={{padding:"4px 10px",borderRadius:4,border:"1px solid "+C.brd,background:"transparent",color:C.acc,cursor:"pointer",fontSize:10,fontWeight:600}}>🔄</button><button onClick={()=>{LS.del(key);setVersions(LS.list("ver:"));show("Smazáno.");}} style={{padding:"4px 8px",borderRadius:4,border:"1px solid "+C.brd,background:"transparent",color:"#f87171",cursor:"pointer",fontSize:10}}>🗑️</button></div></div>);})}</div>)}</div>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
